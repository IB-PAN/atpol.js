# https://github.com/actions/deploy-pages#usage
name: Deploy to GitHub Pages
on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: NUXT_APP_BASE_URL=/atpol.js/ bunx nuxt build --preset github_pages
        working-directory: ./demo
      - name: Inject Google Site Verification Meta Tag
        run: |
          META_TAG='<meta name="google-site-verification" content="qw15kRZnHgyKmvNjL0rZsApXBnfPDFlUWqA3KQIm_u4" />'
          find ./demo/.output/public -name '*.html' -exec sed -i "s|</head>|$META_TAG\n</head>|g" {} +
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./demo/.output/public
  deploy:
    needs: build
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
